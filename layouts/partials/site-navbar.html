<script>
// Mobile menu toggle with animation
let mobileMenuOpen = false;
function toggleMobileMenu() {
  const menu = document.getElementById('mobileMenu');
  const iconOpen = document.getElementById('menuIconOpen');
  const iconClose = document.getElementById('menuIconClose');

  mobileMenuOpen = !mobileMenuOpen;
  menu.classList.toggle('hidden');
  iconOpen.classList.toggle('hidden');
  iconClose.classList.toggle('hidden');

  // Prevent body scroll when menu is open
  document.body.classList.toggle('overflow-hidden', mobileMenuOpen);
}

// Close mobile menu on link click
document.querySelectorAll('#mobileMenu a, #mobileMenu button').forEach(el => {
  el.addEventListener('click', () => {
    if (mobileMenuOpen) {
      toggleMobileMenu();
    }
  });
});

// Close mobile menu on escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && mobileMenuOpen) {
    toggleMobileMenu();
  }
});

// Update mobile nav visibility alongside desktop
const origUpdateNav = PadelGo.UI.updateNav;
PadelGo.UI.updateNav = function(user) {
  origUpdateNav(user);
  const hasSession = !!PadelGo.Cookies.get('sess');
  const role = (user && user.role) || 'user';

  document.querySelectorAll('.nav-dashboard-link-mobile').forEach(el => {
    el.classList.toggle('hidden', !hasSession);
    el.classList.toggle('flex', hasSession);
  });
  document.querySelectorAll('.nav-admin-link-mobile').forEach(el => {
    el.classList.toggle('hidden', !hasSession || role !== 'admin');
    el.classList.toggle('flex', hasSession && role === 'admin');
  });
  document.querySelectorAll('.nav-settings-link-mobile').forEach(el => {
    el.classList.toggle('hidden', !hasSession);
    el.classList.toggle('flex', hasSession);
  });
  document.querySelectorAll('.nav-login-link-mobile, .nav-register-link-mobile').forEach(el => {
    el.classList.toggle('hidden', hasSession);
    el.classList.toggle('flex', !hasSession);
  });
  document.querySelectorAll('.nav-logout-btn-mobile').forEach(el => {
    el.classList.toggle('hidden', !hasSession);
    el.classList.toggle('flex', hasSession);
  });
};
</script>
