<script>
// Mobile menu state
let mobileMenuOpen = false;
function toggleMobileMenu() {
  const menu = document.getElementById('mobileMenu');
  const overlay = document.getElementById('mobileMenuOverlay');
  const iconOpen = document.getElementById('menuIconOpen');
  const iconClose = document.getElementById('menuIconClose');

  mobileMenuOpen = !mobileMenuOpen;

  if (mobileMenuOpen) {
    menu.classList.remove('-translate-x-full');
    overlay.classList.remove('opacity-0', 'invisible');
    overlay.classList.add('opacity-100', 'visible');
    document.body.classList.add('overflow-hidden');
    iconOpen.classList.add('hidden');
    iconClose.classList.remove('hidden');
  } else {
    menu.classList.add('-translate-x-full');
    overlay.classList.add('opacity-0', 'invisible');
    overlay.classList.remove('opacity-100', 'visible');
    document.body.classList.remove('overflow-hidden');
    iconOpen.classList.remove('hidden');
    iconClose.classList.add('hidden');
  }
}

// User dropdown for desktop
function toggleUserDropdown() {
  const dropdown = document.getElementById('userDropdown');
  dropdown.classList.toggle('hidden');
}

// Close dropdown when clicking outside
document.addEventListener('click', (e) => {
  const dropdown = document.getElementById('userDropdown');
  const toggle = e.target.closest('[onclick="toggleUserDropdown()"]');
  if (!toggle && !dropdown.contains(e.target)) {
    dropdown.classList.add('hidden');
  }
});

// Close mobile menu on escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && mobileMenuOpen) {
    toggleMobileMenu();
  }
});

// Initialize auth state on load
function initNavAuth() {
  const cookies = document.cookie.split(';');
  const hasSession = cookies.some(c => c.trim().startsWith('sess='));
  const userCookie = cookies.find(c => c.trim().startsWith('padelgo_user='));
  const hasUser = userCookie && userCookie.split('=')[1] && userCookie.split('=')[1] !== '{}';
  const isLoggedIn = hasSession && hasUser;

  // Desktop elements
  const loginLinks = document.querySelectorAll('.nav-login-link, .nav-register-link');
  const userMenus = document.querySelectorAll('.nav-user-menu');
  const desktopAuth = document.querySelector('.nav-desktop-auth');
  const userDropdown = document.getElementById('userDropdown');

  if (isLoggedIn) {
    loginLinks.forEach(el => { el.classList.add('hidden'); el.style.display = 'none'; });
    userMenus.forEach(el => { el.classList.remove('hidden'); el.style.display = ''; });
    if (desktopAuth) desktopAuth.style.display = 'none';
  } else {
    loginLinks.forEach(el => { el.classList.remove('hidden'); el.style.display = ''; });
    userMenus.forEach(el => { el.classList.add('hidden'); el.style.display = 'none'; });
    if (desktopAuth) desktopAuth.style.display = '';
  }

  // Mobile elements
  const mobileGuestSection = document.querySelector('.nav-mobile-guest-section');
  const mobileAuthSection = document.querySelector('.nav-mobile-auth-section');
  const mobileUserHeader = document.querySelector('.nav-mobile-user-header');
  const mobileLoginLinks = document.querySelectorAll('.nav-login-link-mobile, .nav-register-link-mobile');
  const mobileDashboardLinks = document.querySelectorAll('.nav-dashboard-link-mobile, .nav-settings-link-mobile, .nav-admin-link-mobile');
  const mobileLogoutBtns = document.querySelectorAll('#mobileMenu .nav-logout-btn-mobile, #mobileMenu button[onclick*="logout"]');

  if (isLoggedIn) {
    mobileGuestSection?.classList.add('hidden');
    mobileAuthSection?.classList.remove('hidden');
    mobileUserHeader?.classList.remove('hidden');
    mobileLoginLinks.forEach(el => { el.classList.add('hidden'); el.style.display = 'none'; });
    mobileDashboardLinks.forEach(el => { el.classList.remove('hidden'); el.style.display = ''; });
    mobileLogoutBtns.forEach(el => { el.classList.remove('hidden'); el.style.display = ''; });
  } else {
    mobileGuestSection?.classList.remove('hidden');
    mobileAuthSection?.classList.add('hidden');
    mobileUserHeader?.classList.add('hidden');
    mobileLoginLinks.forEach(el => { el.classList.remove('hidden'); el.style.display = ''; });
    mobileDashboardLinks.forEach(el => { el.classList.add('hidden'); el.style.display = 'none'; });
    mobileLogoutBtns.forEach(el => { el.classList.add('hidden'); el.style.display = 'none'; });
  }
}

// Run on load
initNavAuth();

// Update nav when user state changes
if (typeof PadelGo !== 'undefined' && PadelGo.UI) {
  const origUpdateNav = PadelGo.UI.updateNav;
  PadelGo.UI.updateNav = function(user) {
    origUpdateNav(user);
    initNavAuth();
  };
}
</script>
