<!DOCTYPE html>
<html lang="en">
<head>
  {{ partial "site-head.html" . }}
</head>
<body class="font-sans antialiased bg-slate-50 text-slate-950 transition-colors duration-300 dark:bg-slate-950 dark:text-slate-100">
  {{ partial "site-navbar.html" . }}
  <div class="pt-16">
    <div class="max-w-4xl mx-auto px-4 py-12">
      <h1 class="text-3xl font-bold text-slate-900 dark:text-white">{{ .Title }}</h1>
      <div class="mt-8 grid gap-6">
        {{ range .Paginator.Pages }}
        <article class="rounded-2xl border border-slate-200 bg-white p-6 dark:border-slate-800 dark:bg-slate-900">
          <h2 class="text-xl font-bold">
            <a href="{{ .Permalink }}" class="text-slate-900 dark:text-white hover:text-teal-600 dark:hover:text-teal-400">{{ .Title }}</a>
          </h2>
          <p class="mt-2 text-slate-600 dark:text-slate-400">{{ .Summary }}</p>
          <time class="mt-4 block text-sm text-slate-500">{{ .Date.Format "January 2, 2006" }}</time>
        </article>
        {{ end }}
      </div>
      {{ template "_internal/pagination.html" . }}
    </div>
  </div>
</body>
</html>
