function toggleMobileMenu() {
  const menu = document.getElementById('mobileMenu');
  const overlay = document.getElementById('mobileMenuOverlay');
  const iconOpen = document.getElementById('menuIconOpen');
  const iconClose = document.getElementById('menuIconClose');

  const isOpen = menu.getAttribute('data-open') === 'true';

  if (isOpen) {
    
    menu.setAttribute('data-open', 'false');
    menu.classList.add('translate-x-[-100%]');
    menu.classList.remove('translate-x-0');
    overlay.classList.add('opacity-0', 'invisible', 'pointer-events-none');
    document.body.classList.remove('overflow-hidden');
    iconOpen.classList.remove('hidden');
    iconClose.classList.add('hidden');
  } else {
    
    menu.setAttribute('data-open', 'true');
    menu.classList.remove('translate-x-[-100%]');
    menu.classList.add('translate-x-0');
    overlay.classList.remove('opacity-0', 'invisible', 'pointer-events-none');
    document.body.classList.add('overflow-hidden');
    iconOpen.classList.add('hidden');
    iconClose.classList.remove('hidden');
  }
}


document.addEventListener('keydown', (e) => {
  const menu = document.getElementById('mobileMenu');
  if (e.key === 'Escape' && menu.getAttribute('data-open') === 'true') {
    toggleMobileMenu();
  }
});




function toggleUserDropdown() {
  const dropdown = document.getElementById('userDropdown');
  dropdown.classList.toggle('hidden');
}


document.addEventListener('click', (e) => {
  const dropdown = document.getElementById('userDropdown');
  const userBtn = document.querySelector('.nav-user-btn');
  if (userBtn && !userBtn.contains(e.target) && !dropdown.contains(e.target)) {
    dropdown.classList.add('hidden');
  }
});




function initNavAuth() {
  const cookies = document.cookie.split(';');
  const hasSession = cookies.some(c => c.trim().startsWith('sess='));
  const userCookie = cookies.find(c => c.trim().startsWith('padelgo_user='));
  const hasUser = userCookie && userCookie.split('=')[1] && userCookie.split('=')[1] !== '{}';
  const isLoggedIn = hasSession && hasUser;

  
  const userMenu = document.querySelector('.nav-user-menu');
  const authBtns = document.querySelector('.nav-auth-buttons');

  if (isLoggedIn) {
    userMenu?.classList.remove('hidden');
    authBtns?.classList.add('hidden');
  } else {
    userMenu?.classList.add('hidden');
    authBtns?.classList.remove('hidden');
  }

  
  const mobileGuestSection = document.querySelector('.nav-mobile-guest-section');
  const mobileAuthSection = document.querySelector('.nav-mobile-auth-section');
  const mobileUserHeader = document.querySelector('.nav-mobile-user-header');

  if (isLoggedIn) {
    mobileGuestSection?.classList.add('hidden');
    mobileAuthSection?.classList.remove('hidden');
    mobileUserHeader?.classList.remove('hidden');
  } else {
    mobileGuestSection?.classList.remove('hidden');
    mobileAuthSection?.classList.add('hidden');
    mobileUserHeader?.classList.add('hidden');
  }
}


document.addEventListener('DOMContentLoaded', initNavAuth);


if (typeof PadelGo !== 'undefined' && PadelGo.UI) {
  const origUpdateNav = PadelGo.UI.updateNav;
  PadelGo.UI.updateNav = function(user) {
    if (origUpdateNav) origUpdateNav(user);
    initNavAuth();
  };
}
