AWSTemplateFormatVersion: '2010-09-09'
Description: PadelGo Backend - Single Lambda + HTTP API + DynamoDB + S3

Transform: AWS::Serverless-2016-10-31

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
  JwtSecret:
    Type: String
    NoEcho: true
    Description: JWT signing secret (min 32 chars)
    MinLength: 32

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 30
    MemorySize: 512
    Architectures:
      - x86_64
    Environment:
      Variables:
        NODE_ENV: !Sub ${Environment}
        JWT_SECRET: !Ref JwtSecret
        JWT_EXPIRY: 2h
        CORS_ORIGIN: '*'
        USERS_TABLE: !Ref UsersTable
        COURTS_TABLE: !Ref CourtsTable
        BOOKINGS_TABLE: !Ref BookingsTable
        S3_BUCKET: !Ref UploadsBucket

  HttpApi:
    StageName: !Sub ${Environment}
    CorsConfiguration:
      AllowOrigins:
        - '*'
      AllowHeaders:
        - Content-Type
        - Authorization
        - X-Requested-With
      AllowMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      MaxAge: 86400

Resources:
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${Environment}-padelgo-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: email
          AttributeType: S
        - AttributeName: entityType
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: EmailIndex
          KeySchema:
            - AttributeName: entityType
              KeyType: HASH
            - AttributeName: email
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: padelgo
        - Key: Environment
          Value: !Ref Environment

  CourtsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${Environment}-padelgo-courts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: entityType
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      Tags:
        - Key: Project
          Value: padelgo
        - Key: Environment
          Value: !Ref Environment

  BookingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${Environment}-padelgo-bookings
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: courtId
          AttributeType: S
        - AttributeName: date
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: UserIdIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: CourtDateIndex
          KeySchema:
            - AttributeName: courtId
              KeyType: HASH
            - AttributeName: date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: padelgo
        - Key: Environment
          Value: !Ref Environment

  UploadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${Environment}-padelgo-uploads-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - '*'
            AllowedMethods:
              - GET
              - PUT
              - POST
            AllowedHeaders:
              - '*'
            MaxAge: 3000
      Tags:
        - Key: Project
          Value: padelgo
        - Key: Environment
          Value: !Ref Environment

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${Environment}-padelgo-api
      CodeUri: backend/
      Handler: src/index.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - DynamoDBWritePolicy:
            TableName: !Ref UsersTable
        - DynamoDBReadPolicy:
            TableName: !Ref CourtsTable
        - DynamoDBReadPolicy:
            TableName: !Ref BookingsTable
        - DynamoDBWritePolicy:
            TableName: !Ref BookingsTable
        - S3CrudPolicy:
            BucketName: !Ref UploadsBucket
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /api/{proxy+}
            Method: ANY
        Health:
          Type: HttpApi
          Properties:
            Path: /health
            Method: GET

Outputs:
  ApiUrl:
    Description: API Gateway HTTP API URL
    Value: !Sub https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
  UsersTable:
    Description: DynamoDB Users Table Name
    Value: !Ref UsersTable
  CourtsTable:
    Description: DynamoDB Courts Table Name
    Value: !Ref CourtsTable
  BookingsTable:
    Description: DynamoDB Bookings Table Name
    Value: !Ref BookingsTable
  UploadsBucket:
    Description: S3 Uploads Bucket Name
    Value: !Ref UploadsBucket