<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - PadelGo</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Inter',sans-serif}</style>
</head>
<body class="bg-gray-100 min-h-screen">

<div id="loading" class="fixed inset-0 flex items-center justify-center bg-white z-50">
<div class="text-center"><div class="w-12 h-12 border-4 border-gray-200 border-t-teal-500 rounded-full animate-spin mx-auto"></div><p class="mt-4 text-gray-600">Memuat...</p></div>
</div>

<div id="errorPage" class="hidden fixed inset-0 flex items-center justify-center bg-white z-50">
<div class="text-center p-8"><h2 class="text-2xl font-bold text-gray-900 mb-2">Akses Ditolak</h2><p id="errorMsg" class="text-gray-600 mb-6"></p><a href="/login/" class="bg-teal-500 text-white px-6 py-3 rounded-lg font-bold">Login</a></div>
</div>

<div id="mainPage" class="hidden">
<header class="bg-white shadow-sm"><div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-gradient-to-br from-teal-500 to-teal-700 rounded-xl flex items-center justify-center"><span class="text-white font-bold">P</span></div><span class="font-bold text-xl">PadelGo</span><span class="bg-teal-100 text-teal-700 px-3 py-1 rounded-full text-sm font-bold">Admin</span></div><button onclick="refreshData()" class="p-2 hover:bg-gray-100 rounded-lg">🔄</button><button onclick="logoutUser()" class="p-2 hover:bg-red-50 text-red-600 rounded-lg">🚪</button></div></header>

<main class="max-w-6xl mx-auto px-4 py-8">
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
<div class="bg-white rounded-xl p-5 shadow-sm"><p class="text-sm text-gray-500">Total</p><p id="totalAll" class="text-2xl font-bold">0</p></div>
<div class="bg-white rounded-xl p-5 shadow-sm"><p class="text-sm text-amber-600">Pending</p><p id="totalPending" class="text-2xl font-bold text-amber-600">0</p></div>
<div class="bg-white rounded-xl p-5 shadow-sm"><p class="text-sm text-emerald-600">Approved</p><p id="totalApproved" class="text-2xl font-bold text-emerald-600">0</p></div>
<div class="bg-white rounded-xl p-5 shadow-sm"><p class="text-sm text-purple-600">Revenue</p><p id="totalRevenue" class="text-xl font-bold text-purple-600">Rp 0</p></div>
</div>

<div class="bg-white rounded-xl shadow-sm overflow-hidden">
<div class="flex border-b border-gray-200">
<button onclick="showPanel('bookings')" id="btnBookings" class="px-6 py-4 font-semibold text-teal-600 border-b-2 border-teal-500">Booking</button>
<button onclick="showPanel('manual')" id="btnManual" class="px-6 py-4 font-semibold text-gray-500">Manual</button>
<button onclick="showPanel('finance')" id="btnFinance" class="px-6 py-4 font-semibold text-gray-500">Keuangan</button>
<button onclick="showPanel('users')" id="btnUsers" class="px-6 py-4 font-semibold text-gray-500">Users</button>
</div>

<div id="panelBookings" class="p-6 space-y-3"></div>

<div id="panelManual" class="p-6 hidden">
<form id="bookingForm" class="max-w-lg space-y-4">
<div class="grid md:grid-cols-2 gap-4">
<input type="text" id="fName" placeholder="Nama *" required class="w-full px-4 py-3 border rounded-xl">
<input type="email" id="fEmail" placeholder="Email *" required class="w-full px-4 py-3 border rounded-xl">
<input type="tel" id="fPhone" placeholder="Telepon *" required class="w-full px-4 py-3 border rounded-xl">
<input type="date" id="fDate" required class="w-full px-4 py-3 border rounded-xl">
<select id="fCourt" required class="w-full px-4 py-3 border rounded-xl"><option value="">Pilih Lapangan</option></select>
<select id="fDuration" class="w-full px-4 py-3 border rounded-xl"><option value="1">1 Jam</option><option value="2">2 Jam</option><option value="3">3 Jam</option><option value="4">4 Jam</option></select>
<select id="fTime" required class="w-full px-4 py-3 border rounded-xl"><option value="">Pilih Waktu</option><option>06:00</option><option>07:00</option><option>08:00</option><option>09:00</option><option>10:00</option><option>11:00</option><option>12:00</option><option>13:00</option><option>14:00</option><option>15:00</option><option>16:00</option><option>17:00</option><option>18:00</option><option>19:00</option><option>20:00</option><option>21:00</option></select>
</div>
<button type="submit" class="w-full bg-teal-500 text-white py-4 rounded-xl font-bold">Buat Booking</button>
</form>
</div>

<div id="panelFinance" class="p-6 hidden">
<div class="grid grid-cols-3 gap-4 mb-6">
<div class="bg-emerald-50 rounded-xl p-4"><p class="text-sm text-emerald-700">Approved</p><p id="finApproved" class="text-lg font-bold text-emerald-600">Rp 0</p></div>
<div class="bg-amber-50 rounded-xl p-4"><p class="text-sm text-amber-700">Pending</p><p id="finPending" class="text-lg font-bold text-amber-600">Rp 0</p></div>
<div class="bg-red-50 rounded-xl p-4"><p class="text-sm text-red-700">Cancelled</p><p id="finCancelled" class="text-lg font-bold text-red-600">Rp 0</p></div>
</div>
<div id="financeData"></div>
</div>

<div id="panelUsers" class="p-6 hidden"><div id="usersData"></div></div>
</div>
</main>
</div>

<div id="toast" class="hidden fixed bottom-4 right-4 px-6 py-3 rounded-xl font-semibold shadow-lg z-50"></div>

<script>
var SB_URL = 'https://fgjmqqdwyvawtvfkzgrr.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnam1xcWR3eXZhd3R2Zmt6Z3JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MTkzNTksImV4cCI6MjA5ODM5NTM1OX0.rEGjOsJ3oIY2SryTdPFSOt3lxjsycxbHtifzeUnwYlE';
var supabase, bookings = [], courts = [], users = [];

function E(id) { return document.getElementById(id); }
function RP(n) { return 'Rp ' + Number(n||0).toLocaleString('id-ID'); }
function EH(s) { if(!s)return''; return s.replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }

function showToast(msg, err) {
  var t = E('toast');
  t.textContent = msg;
  t.className = 'fixed bottom-4 right-4 px-6 py-3 rounded-xl font-semibold shadow-lg z-50 ' + (err?'bg-red-500 text-white':'bg-gray-900 text-white');
  t.classList.remove('hidden');
  setTimeout(function(){ t.classList.add('hidden'); }, 3000);
}

async function init() {
  try {
    if (!window.supabase) {
      await new Promise(function(res, rej) {
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }
    supabase = window.supabase.createClient(SB_URL, SB_KEY);

    var res = await supabase.auth.getSession();
    if (!res.data || !res.data.session) throw new Error('Silakan login dulu');

    var profile = await supabase.from('profiles').select('*').eq('id', res.data.session.user.id).single();
    if (!profile.data) throw new Error('Profile tidak ditemukan');
    if (profile.data.role !== 'admin') throw new Error('Anda bukan admin');

    var b = await supabase.from('bookings').select('*').order('created_at', {ascending:false});
    var c = await supabase.from('courts').select('*').order('name');
    var u = await supabase.from('profiles').select('*').order('created_at', {ascending:false});

    bookings = b.data || [];
    courts = c.data || [];
    users = u.data || [];

    E('loading').classList.add('hidden');
    E('mainPage').classList.remove('hidden');
    renderAll();
  } catch(e) {
    E('loading').classList.add('hidden');
    E('errorMsg').textContent = e.message;
    E('errorPage').classList.remove('hidden');
  }
}

function renderAll() {
  var approved = bookings.filter(function(b){return b.status==='approved'});
  var pending = bookings.filter(function(b){return b.status==='pending'});

  E('totalAll').textContent = bookings.length;
  E('totalPending').textContent = pending.length;
  E('totalApproved').textContent = approved.length;
  E('totalRevenue').textContent = RP(approved.reduce(function(s,b){return s+(b.amount||0)},0));

  E('finApproved').textContent = RP(approved.reduce(function(s,b){return s+(b.amount||0)},0));
  E('finPending').textContent = RP(pending.reduce(function(s,b){return s+(b.amount||0)},0));
  E('finCancelled').textContent = RP(bookings.filter(function(b){return b.status==='cancelled'}).reduce(function(s,b){return s+(b.amount||0)},0));

  var courtOpts = '<option value="">Pilih Lapangan</option>';
  courts.forEach(function(c){ if(c.available) courtOpts += '<option value="'+c.id+'">'+EH(c.name)+' - '+RP(c.price_per_hour)+'/jam</option>'; });
  E('fCourt').innerHTML = courtOpts;

  var today = new Date().toISOString().split('T')[0];
  E('fDate').min = today;
  E('fDate').value = today;

  renderBookings();
  renderFinance();
  renderUsers();
}

function renderBookings() {
  var html = '';
  if (bookings.length === 0) {
    html = '<p class="text-center text-gray-500 py-8">Belum ada booking</p>';
  } else {
    bookings.forEach(function(b) {
      var color = b.status==='approved'?'bg-emerald-100 text-emerald-700':b.status==='pending'?'bg-amber-100 text-amber-700':'bg-red-100 text-red-700';
      var user = users.find(function(u){return u.id===b.user_id});
      html += '<div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl">';
      html += '<div><p class="font-semibold">'+EH(b.court_name)+'</p><p class="text-sm text-gray-500">'+b.date+' '+b.start_time+'-'+b.end_time+'</p><p class="text-sm text-gray-500">'+EH(user?(user.name||user.email):'-')+'</p></div>';
      html += '<div class="text-right"><span class="px-3 py-1 rounded-full text-sm font-bold '+color+'">'+b.status+'</span>';
      html += '<p class="font-bold mt-1">'+RP(b.amount)+'</p>';
      if (b.status === 'pending') {
        html += '<button onclick="setStatus(\''+b.id+'\',\'approved\')" class="mt-2 px-3 py-1 bg-emerald-500 text-white text-sm rounded-lg">Approve</button>';
      }
      html += '</div></div>';
    });
  }
  E('panelBookings').innerHTML = html;
}

function renderFinance() {
  var byCourt = {};
  bookings.forEach(function(b) {
    if (!byCourt[b.court_name]) byCourt[b.court_name] = {approved:0,pending:0,cancelled:0,amount:0};
    if (b.status==='approved') byCourt[b.court_name].approved++;
    else if (b.status==='pending') byCourt[b.court_name].pending++;
    else byCourt[b.court_name].cancelled++;
    if (b.status==='approved') byCourt[b.court_name].amount += b.amount||0;
  });

  var html = '';
  var keys = Object.keys(byCourt);
  if (keys.length === 0) {
    html = '<p class="text-center text-gray-500 py-8">Tidak ada data</p>';
  } else {
    keys.forEach(function(court) {
      var d = byCourt[court];
      html += '<div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl">';
      html += '<p class="font-semibold">'+EH(court)+'</p>';
      html += '<div class="flex gap-4 text-sm">';
      html += '<span class="text-emerald-600">✓ '+d.approved+'</span>';
      html += '<span class="text-amber-600">⏳ '+d.pending+'</span>';
      html += '<span class="text-red-600">✕ '+d.cancelled+'</span>';
      html += '<span class="font-bold">'+RP(d.amount)+'</span></div></div>';
    });
  }
  E('financeData').innerHTML = html;
}

function renderUsers() {
  var html = '';
  if (users.length === 0) {
    html = '<p class="text-center text-gray-500 py-8">Belum ada user</p>';
  } else {
    users.forEach(function(u) {
      var rc = u.role==='admin'?'bg-purple-100 text-purple-700':'bg-gray-100 text-gray-700';
      html += '<div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl">';
      html += '<div><p class="font-semibold">'+EH(u.name||'-')+'</p><p class="text-sm text-gray-500">'+EH(u.email||'-')+'</p></div>';
      html += '<span class="px-3 py-1 rounded-full text-sm font-bold '+rc+'">'+(u.role||'user')+'</span></div>';
    });
  }
  E('usersData').innerHTML = html;
}

async function setStatus(id, status) {
  try {
    await supabase.from('bookings').update({status:status}).eq('id',id);
    showToast('Status updated');
    var b = await supabase.from('bookings').select('*').order('created_at',{ascending:false});
    bookings = b.data||[];
    renderAll();
  } catch(e) { showToast('Error: '+e.message, true); }
}

function showPanel(name) {
  var panels = ['panelBookings','panelManual','panelFinance','panelUsers'];
  var btns = ['btnBookings','btnManual','btnFinance','btnUsers'];
  var names = ['bookings','manual','finance','users'];
  panels.forEach(function(p){ E(p).classList.add('hidden'); });
  btns.forEach(function(b){
    E(b).classList.remove('text-teal-600','border-b-2','border-teal-500');
    E(b).classList.add('text-gray-500');
  });
  var idx = names.indexOf(name);
  if (idx >= 0) {
    E(panels[idx]).classList.remove('hidden');
    E(btns[idx]).classList.add('text-teal-600','border-b-2','border-teal-500');
    E(btns[idx]).classList.remove('text-gray-500');
  }
}

async function refreshData() {
  try {
    var b = await supabase.from('bookings').select('*').order('created_at',{ascending:false});
    var c = await supabase.from('courts').select('*').order('name');
    var u = await supabase.from('profiles').select('*').order('created_at',{ascending:false});
    bookings = b.data||[];
    courts = c.data||[];
    users = u.data||[];
    renderAll();
    showToast('Data refreshed');
  } catch(e) { showToast('Error: '+e.message, true); }
}

function logoutUser() {
  supabase.auth.signOut();
  window.location.href = '/login/';
}

E('bookingForm').onsubmit = async function(e) {
  e.preventDefault();
  var name = E('fName').value.trim();
  var email = E('fEmail').value.trim();
  var phone = E('fPhone').value.trim();
  var date = E('fDate').value;
  var courtId = E('fCourt').value;
  var duration = parseInt(E('fDuration').value)||1;
  var time = E('fTime').value;

  if (!name||!email||!phone||!date||!courtId||!time) {
    showToast('Lengkapi semua data!', true);
    return;
  }

  try {
    var userR = await supabase.from('profiles').select('id').eq('email',email).single();
    if (!userR.data) {
      showToast('User tidak ditemukan. Harap daftar dulu.', true);
      return;
    }
    var court = courts.find(function(c){return c.id===courtId});
    var endH = parseInt(time.split(':')[0]) + duration;
    var amount = (court?court.price_per_hour:150000) * duration;

    await supabase.from('bookings').insert({
      id: 'BK'+Date.now(),
      user_id: userR.data.id,
      court_id: courtId,
      court_name: court?court.name:courtId,
      date: date,
      start_time: time,
      end_time: String(endH).padStart(2,'0')+':00',
      duration_hours: duration,
      amount: amount,
      status: 'approved'
    });

    showToast('Booking berhasil!');
    E('bookingForm').reset();
    await refreshData();
  } catch(err) { showToast('Error: '+err.message, true); }
};

init();
</script>
</body>
</html>
